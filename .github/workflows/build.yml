name: build

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Build
        run: dotnet build .\WindowsAIStatusbar.csproj -c Release
      - name: Publish
        run: >
          dotnet publish .\WindowsAIStatusbar.csproj
          -c Release
          -r win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -o .\publish
      - uses: actions/upload-artifact@v4
        with:
          name: WindowsAIStatusbar-win-x64
          path: |
            publish\WindowsAIStatusbar.exe
            install.ps1
            uninstall.ps1
